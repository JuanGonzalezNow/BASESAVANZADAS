<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RIDEAXIS - Admin{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='image/favicon.png') }}" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar VERTICAL COMPACTO -->
        <div class="w-64 bg-white border-r-2 border-gray-300 shadow-lg flex flex-col">
            <!-- Logo -->
            <div class="p-6 border-b-2 border-gray-300 bg-gradient-to-br from-red-50 to-white">
                <h1 class="text-2xl font-black text-red-600 tracking-widest">RIDEAXIS</h1>
                <p class="text-xs text-gray-600 mt-2 font-bold">Admin</p>
            </div>

            <!-- Menú VERTICAL COMPACTO SIN SCROLL -->
            <nav class="flex-1 py-6 px-4 space-y-2 flex flex-col">
                <!-- Dashboard -->
                <a href="{{ url_for('admin.dashboard') }}" class="{% if 'dashboard' in request.endpoint %}bg-red-600 text-white rounded-lg shadow-md{% else %}text-gray-700 hover:bg-gray-100{% endif %} flex items-center gap-3 px-4 py-3 transition-all duration-200 rounded-lg font-semibold text-sm">
                    <i class="fas fa-chart-line text-lg w-5"></i>
                    <span>Dashboard</span>
                </a>

                <!-- Motos -->
                <a href="{{ url_for('admin.listar_motos') }}" class="{% if 'motos' in request.endpoint %}bg-red-600 text-white rounded-lg shadow-md{% else %}text-gray-700 hover:bg-gray-100{% endif %} flex items-center gap-3 px-4 py-3 transition-all duration-200 rounded-lg font-semibold text-sm">
                    <i class="fas fa-motorcycle text-lg w-5"></i>
                    <span>Motos</span>
                </a>

                <!-- Ventas -->
                <a href="{{ url_for('admin.ventas') }}" class="{% if 'ventas' in request.endpoint %}bg-red-600 text-white rounded-lg shadow-md{% else %}text-gray-700 hover:bg-gray-100{% endif %} flex items-center gap-3 px-4 py-3 transition-all duration-200 rounded-lg font-semibold text-sm">
                    <i class="fas fa-chart-bar text-lg w-5"></i>
                    <span>Ventas</span>
                </a>

                <!-- Usuarios -->
                <a href="{{ url_for('admin.usuarios') }}" class="{% if 'usuarios' in request.endpoint %}bg-red-600 text-white rounded-lg shadow-md{% else %}text-gray-700 hover:bg-gray-100{% endif %} flex items-center gap-3 px-4 py-3 transition-all duration-200 rounded-lg font-semibold text-sm">
                    <i class="fas fa-users text-lg w-5"></i>
                    <span>Usuarios</span>
                </a>

                <!-- SQL Console -->
                <a href="{{ url_for('admin.ejecutor_sql') }}" class="{% if 'ejecutor_sql' in request.endpoint %}bg-red-600 text-white rounded-lg shadow-md{% else %}text-gray-700 hover:bg-gray-100{% endif %} flex items-center gap-3 px-4 py-3 transition-all duration-200 rounded-lg font-semibold text-sm">
                    <i class="fas fa-database text-lg w-5"></i>
                    <span>SQL Console</span>
                </a>

                <!-- Spacer -->
                <div class="flex-1"></div>
            </nav>

            <!-- Footer -->
            <div class="p-4 border-t-2 border-gray-300 bg-gray-50">
                <p class="text-xs text-gray-700 font-bold mb-3">ADMINISTRADOR</p>
                <a href="{{ url_for('auth.logout') }}" class="block w-full text-center px-3 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-xs font-bold transition">
                    <i class="fas fa-sign-out-alt mr-2"></i> Salir
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="bg-white border-b-2 border-gray-200 px-8 py-4 shadow-sm">
                <h2 class="text-2xl font-black text-gray-900">{% block page_title %}Bienvenido{% endblock %}</h2>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-8">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
